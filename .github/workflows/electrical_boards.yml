name: "electrical_boards"

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/electrical_boards.yml'
      - '.github/workflows/deploy_nightly_release.yml'
      - '.github/workflows/convert_bottom_position.py'
      - 'Electrical/Design/**'

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  generate-artifacts:
    name: kicad export
    runs-on: ubuntu-latest
    container: "ghcr.io/inti-cmnb/kicad9_auto_full:latest"    
    strategy:
      fail-fast: false
      matrix:
        board:
        - 'PCBA-DEBUG-ACCESSORY'
        - 'PCBA-DEBUG-UART'
        - 'PCBA-INTERFACE'
        - 'PCBA-BU16'
        - 'PCBA-BU16-SPACER'
        - 'PCBA-BU16-PLATE'
        - 'PCBA-PO16'
        - 'PCBA-PBF4'
        - 'PCBA-PBF4-SPACER'
        - 'PCBA-PBF4-PLATE'
        - 'PCBA-EN16'
        - 'PCBA-EF44'
        - 'PCBA-TEK2'
        - 'PCBA-VSNX'
        - 'PCBA-VSNX-SPACER'
        - 'PCBA-VSNX-PLATE'
        - 'PCBA-VSNX-LCDMOUNT'
        - 'PCBA-OCTV'
        - 'PCBA-OCTV-SPACER'
        - 'PCBA-OCTV-PLATE'
        - 'PCBA-XY-TOUCH'
        - 'PCBA-XY-LED'
        - 'FP-XX16'
        - 'FP-BU16'
        - 'FP-PBF4'
        - 'FP-EF44'
        - 'FP-VSN1-L'
        - 'FP-VSN1-R'
        - 'FP-TEK2'
        - 'FP-VSN2'
        - 'FP-OCTV'
        - 'FP-XY'
        - 'FP-XY-SPACER'
        - 'FP-BU16-MIDIGRADE'
        - 'FP-EN16-MIDIGRADE'
        - 'FP-TEK2-CLASSIC'
        - 'FP-PBF4-CLASSIC'
        - 'FP-TEK2-HACK'

    steps:
    - uses: actions/checkout@v2

    - name: Run PCB stuff
      run: |
        make -C Electrical/Design/${{ matrix.board }}

    - name: Print errors
      if: ${{ always() }}
      run: |
        FILE=Electrical/Design/${{ matrix.board }}/mfg-bot/${{ matrix.board }}-drc.html
        if [ -f "$FILE" ]; then
          cat "$FILE"
        else
          echo "DRC file for ${{ matrix.board }} does not exist."
        fi
        cat Electrical/Design/${{ matrix.board }}/kibot_error.log

    - name: Set Date
      run: echo "action_date=$(date +'%Y-%m-%d-%H%M')" >> $GITHUB_ENV

    - name: Convert position file
      run: |
        FILE=Electrical/Design/${{ matrix.board }}/mfg-bot/mfg/${{ matrix.board }}-both_pos.csv
        if [ -f "$FILE" ]; then
          python3 .github/workflows/convert_bottom_position.py ../../$FILE ../../Electrical/Design/${{ matrix.board }}/mfg-bot/mfg/${{ matrix.board }}-both_pos_fixed.csv
          rm $FILE
        fi
  
    - name: Zipping gerber      
      uses: vimtor/action-zip@v1
      with:
        files: Electrical/Design/${{ matrix.board }}/mfg-bot/JLCPCB
        dest: Electrical/Design/${{ matrix.board }}/mfg-bot/mfg/${{ matrix.board }}-gerber.zip

    - name: Rename pdf files and removing non-zipped gerber files
      run: |
        mv Electrical/Design/${{ matrix.board }}/mfg-bot/${{ matrix.board }}-erc.html Electrical/Design/${{ matrix.board }}/mfg-bot/${{ matrix.board }}_erc.html
        FILE=Electrical/Design/${{ matrix.board }}/mfg-bot/${{ matrix.board }}-drc.html
        if [ -f "$FILE" ]; then
          mv Electrical/Design/${{ matrix.board }}/mfg-bot/${{ matrix.board }}-drc.html Electrical/Design/${{ matrix.board }}/mfg-bot/${{ matrix.board }}_drc.html
        else
          echo "DRC file for ${{ matrix.board }} does not exist."
        fi
        [ -f Electrical/Design/${{ matrix.board }}/mfg-bot/Schematic.pdf ] && mv Electrical/Design/${{ matrix.board }}/mfg-bot/Schematic.pdf Electrical/Design/${{ matrix.board }}/mfg-bot/${{ matrix.board }}_Schematic.pdf || true
        [ -f Electrical/Design/${{ matrix.board }}/mfg-bot/PCB_Top.pdf ] && mv Electrical/Design/${{ matrix.board }}/mfg-bot/PCB_Top.pdf Electrical/Design/${{ matrix.board }}/mfg-bot/${{ matrix.board }}_PCB_Top.pdf || true
        [ -f Electrical/Design/${{ matrix.board }}/mfg-bot/PCB_Bottom.pdf ] && mv Electrical/Design/${{ matrix.board }}/mfg-bot/PCB_Bottom.pdf Electrical/Design/${{ matrix.board }}/mfg-bot/${{ matrix.board }}_PCB_Bottom.pdf || true
        mv Electrical/Design/${{ matrix.board }}/mfg-bot/kibot_errors.filter Electrical/Design/${{ matrix.board }}/mfg-bot/${{ matrix.board }}_kibot_errors.filter
        mv Electrical/Design/${{ matrix.board }}/kibot_error.log Electrical/Design/${{ matrix.board }}/mfg-bot/${{ matrix.board }}_kibot_error.log
        
        rm -r Electrical/Design/${{ matrix.board }}/mfg-bot/JLCPCB

    - name: Upload results
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: "result_${{ matrix.board }}_${{ env.action_date }}"
        path: |
          Electrical/Design/${{ matrix.board }}/mfg-bot/
          !Electrical/Design/${{ matrix.board }}/mfg-bot/*_drc.html
          !Electrical/Design/${{ matrix.board }}/mfg-bot/*_erc.html
          !Electrical/Design/${{ matrix.board }}/mfg-bot/*_kibot_error.log
          !Electrical/Design/${{ matrix.board }}/mfg-bot/*_kibot_errors.filter
          !Electrical/Design/${{ matrix.board }}/mfg-bot/*blender*.png
          !Electrical/Design/${{ matrix.board }}/mfg-bot/*_PCB_Top.pdf
          !Electrical/Design/${{ matrix.board }}/mfg-bot/*_PCB_Bottom.pdf
        if-no-files-found: warn

  deploy-results:
    needs: generate-artifacts
    if: github.ref == 'refs/heads/master'
    uses: ./.github/workflows/deploy_nightly_release.yml
    with:
      release_name: "Nightly Electrical"
      tag_name: "nightly-electrical"
    secrets: inherit
